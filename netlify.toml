[build]
  command = "npm ci && npm ci --prefix client && npm run prisma:generate && DATABASE_URL=${DATABASE_URL:-$DIRECT_URL} npm run prisma:migrate:deploy && npm run build --prefix client"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client"]
  included_files = ["node_modules/.prisma/client/**"]

[functions."ingest-scheduled"]
  schedule = "0 */3 * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
